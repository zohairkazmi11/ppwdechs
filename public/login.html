<!DOCTYPE html>
<html>
<head>
    <title>PPWDECHS Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(-45deg, #0f172a, #1e293b, #3b82f6, #10b981);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 8s infinite ease-in-out;
        }

        .circle:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 10%;
            left: 15%;
        }

        .circle:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: 10%;
            right: 10%;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .login-box {
            width: 340px;
            padding: 30px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            color: white;
            z-index: 2;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .msg {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            color: #ff6b6b;
        }

        body::after {
            content: "KAZMI";
            position: fixed;
            right: 20px;
            bottom: 30px;
            font-size: 35px;
            font-weight: 900;
            color: rgba(255,255,255,0.06);
            transform: rotate(-25deg);
            pointer-events: none;
        }
    </style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="login-box">
    <h2>PPWDECHS LOGIN</h2>

    <input id="username" placeholder="CNIC / Username">
    <input id="password" type="password" placeholder="Password (Admin only)">

    <button id="loginBtn" onclick="login()">LOGIN</button>

    <div class="msg" id="msg"></div>
</div>

<script>

let isLoggingIn = false;

function login() {

    if (isLoggingIn) return; // 🔥 prevents double calls
    isLoggingIn = true;

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const msg = document.getElementById("msg");
    const btn = document.getElementById("loginBtn");

    msg.innerText = "Checking...";
    btn.disabled = true;

    fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {

        console.log("LOGIN RESPONSE:", data);

        if (!data.success) {
            msg.innerText = data.message || "Invalid login";
            return;
        }

        // save session
        localStorage.setItem("role", data.role);
        localStorage.setItem("cnic", username);

        msg.innerText = "Success...";

        setTimeout(() => {
            if (data.role === "admin") {
                window.location.href = "/admin.html";
            } else {
                window.location.href = "/user.html";
            }
        }, 500);

    })
    .catch(() => {
        msg.innerText = "Server error";
    })
    .finally(() => {
        isLoggingIn = false;
        btn.disabled = false;
    });
}

</script>

</body>
</html>
