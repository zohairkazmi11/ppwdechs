<!DOCTYPE html>
<html>
<head>
    <title>PPWDECHS Login</title>

    <!-- ✅ VERY IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;

            width: 90%;          /* responsive */
            max-width: 400px;    /* limit on PC */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;   /* prevents zoom on mobile */
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        #result {
            text-align: center;
            margin-top: 10px;
            color: #f87171;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>PPWDECHS Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="result"></p>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
        localStorage.setItem("role", data.role);

        if (data.role === "admin") {
            window.location.href = "/admin";
        } else {
            window.location.href = "/user";
        }
    } else {
        document.getElementById("result").innerText = "Invalid login";
    }
}
</script>

</body>
</html>        button:hover {
