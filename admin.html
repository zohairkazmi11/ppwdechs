<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        .sidebar {
            width: 200px;
            background: #0f172a;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .card {
            background: #e2e8f0;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>PPWDECHS Admin</h3>
    <p>Dashboard</p>
    <p>Users</p>
    <p>Notices</p>
</div>

<div class="main">
    <h2>Admin Panel</h2>

    <div class="card" id="totalUsers">Loading...</div>

    <div class="card">
        <h3>User List</h3>
        <div id="userList"></div>
    </div>
</div>

<script>
async function loadUsers() {
    const res = await fetch("/users");
    const users = await res.json();

    document.getElementById("totalUsers").innerText =
        "Total Users: " + users.length;

    const list = document.getElementById("userList");
    list.innerHTML = "";

    users.forEach(u => {
        const div = document.createElement("div");
        div.innerText = u.CNIC || "No CNIC";
        div.style.padding = "5px";
        list.appendChild(div);
    });
}

loadUsers();
</script>

</body>
</html>
